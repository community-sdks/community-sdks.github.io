<!-- index.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Community SDKs — Docs</title>
  <meta name="description" content="Community SDKs documentation hub: missing SDKs brought to life." />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind config (CDN) -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['ui-sans-serif', 'system-ui', 'Segoe UI', 'Roboto', 'Arial', 'Noto Sans', 'Apple Color Emoji', 'Segoe UI Emoji'],
            mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'Liberation Mono', 'Courier New', 'monospace'],
          },
          boxShadow: {
            soft: '0 10px 30px rgba(0,0,0,0.25)',
          }
        }
      }
    }
  </script>

  <!-- Alpine.js CDN -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    * { scrollbar-width: thin; scrollbar-color: rgba(148,163,184,.35) transparent; }
    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-thumb { background: rgba(148,163,184,.25); border-radius: 999px; border: 2px solid transparent; background-clip: content-box; }
    *::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,.35); border: 2px solid transparent; background-clip: content-box; }
    ::selection { background: rgba(59,130,246,.25); }
  </style>
</head>

<body
  class="min-h-screen"
  x-data="ThemeApp()"
  x-init="init()"
  :class="theme === 'dark' ? 'bg-slate-950 text-slate-100' : 'bg-slate-50 text-slate-900'"
>
<div
  x-data="DocsApp()"
  x-init="init(theme)"
  class="min-h-screen"
  @keydown.window.slash.prevent="focusSearch()"
>
  <!-- Top bar -->
  <header
    class="sticky top-0 z-40 border-b backdrop-blur"
    :class="theme === 'dark'
      ? 'border-slate-800/70 bg-slate-950/85'
      : 'border-slate-200/80 bg-white/85'"
  >
    <div class="mx-auto flex max-w-7xl items-center gap-3 px-4 py-3">
      <!-- Mobile menu button -->
      <button
        class="md:hidden inline-flex items-center justify-center rounded-lg border px-3 py-2 hover:bg-slate-900/10 focus:outline-none focus:ring-2 focus:ring-blue-500/40"
        :class="theme === 'dark'
          ? 'border-slate-800 bg-slate-900/40 text-slate-200 hover:bg-slate-900'
          : 'border-slate-200 bg-white text-slate-800 hover:bg-slate-100'"
        @click="ui.mobileNavOpen = true"
        aria-label="Open navigation"
      >
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none">
          <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Brand -->
      <a href="#/" class="group flex items-center gap-3">
        <div
          class="flex h-9 w-9 items-center justify-center rounded-xl ring-1"
          :class="theme === 'dark'
            ? 'bg-gradient-to-br from-emerald-500/30 to-blue-500/20 ring-slate-800'
            : 'bg-gradient-to-br from-emerald-500/15 to-blue-500/10 ring-slate-200'"
        >
          <svg class="h-5 w-5" :class="theme === 'dark' ? 'text-emerald-200' : 'text-emerald-700'" viewBox="0 0 24 24" fill="none">
            <path d="M8 9l-3 3 3 3M16 9l3 3-3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M14 7l-4 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="leading-tight">
          <div class="text-sm font-semibold tracking-tight group-hover:text-blue-500">Community SDKs</div>
          <div class="text-xs" :class="theme === 'dark' ? 'text-slate-400' : 'text-slate-500'">Documentation Hub</div>
        </div>
      </a>

      <div class="flex-1"></div>

      <!-- Desktop Search -->
      <div class="hidden md:flex w-[420px] max-w-[46vw]">
        <div class="relative w-full">
          <input
            x-ref="searchInput"
            x-model="search.query"
            @input.debounce.120ms="onSearch()"
            type="text"
            placeholder="Search docs… (press /)"
            class="w-full rounded-xl border px-10 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500/45"
            :class="theme === 'dark'
              ? 'border-slate-800 bg-slate-900/40 text-slate-100 placeholder:text-slate-500'
              : 'border-slate-200 bg-white text-slate-900 placeholder:text-slate-400'"
          />
          <div class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2" :class="theme === 'dark' ? 'text-slate-500' : 'text-slate-400'">
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none">
              <path d="M21 21l-4.3-4.3m1.8-5.2a7 7 0 11-14 0 7 7 0 0114 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-xs" :class="theme === 'dark' ? 'text-slate-500' : 'text-slate-400'">/</div>
        </div>
      </div>

      <!-- Theme toggle -->
      <button
        class="inline-flex items-center gap-2 rounded-xl border px-3 py-2 text-sm hover:bg-slate-900/10"
        :class="theme === 'dark'
          ? 'border-slate-800 bg-slate-900/30 text-slate-200 hover:bg-slate-900'
          : 'border-slate-200 bg-white text-slate-700 hover:bg-slate-100'"
        @click="$root.toggleTheme(); theme = $root.theme; $dispatch('theme-changed', { theme })"
        title="Toggle theme"
      >
        <template x-if="theme === 'dark'">
          <span class="inline-flex items-center gap-2">
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none">
              <path d="M21 13.5A8.5 8.5 0 1110.5 3a7 7 0 0010.5 10.5z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Dark
          </span>
        </template>
        <template x-if="theme !== 'dark'">
          <span class="inline-flex items-center gap-2">
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none">
              <path d="M12 18a6 6 0 100-12 6 6 0 000 12z" stroke="currentColor" stroke-width="2"/>
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            Light
          </span>
        </template>
      </button>

      <!-- External link -->
      <a
        class="hidden sm:inline-flex items-center gap-2 rounded-xl border px-3 py-2 text-sm hover:bg-slate-900/10"
        :class="theme === 'dark'
          ? 'border-slate-800 bg-slate-900/30 text-slate-200 hover:bg-slate-900'
          : 'border-slate-200 bg-white text-slate-800 hover:bg-slate-100'"
        href="https://github.com/community-sdks"
        target="_blank"
        rel="noreferrer"
      >
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none">
          <path d="M9 19c-4 1.5-4-2.5-5-3m10 6v-3.2c0-.9.3-1.3.8-1.8-2.7-.3-5.6-1.3-5.6-6a4.6 4.6 0 011.2-3.2 4.3 4.3 0 01.1-3.1s1-.3 3.3 1.2a11.2 11.2 0 016 0C19 5.1 20 5.4 20 5.4a4.3 4.3 0 01.1 3.1 4.6 4.6 0 011.2 3.2c0 4.7-2.9 5.7-5.6 6 .5.5.9 1.1.9 2.3V22"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        GitHub
      </a>
    </div>

    <!-- Mobile search -->
    <div class="md:hidden px-4 pb-3">
      <div class="relative">
        <input
          x-model="search.query"
          @input.debounce.120ms="onSearch()"
          type="text"
          placeholder="Search docs…"
          class="w-full rounded-xl border px-10 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500/45"
          :class="theme === 'dark'
            ? 'border-slate-800 bg-slate-900/40 text-slate-100 placeholder:text-slate-500'
            : 'border-slate-200 bg-white text-slate-900 placeholder:text-slate-400'"
        />
        <div class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2" :class="theme === 'dark' ? 'text-slate-500' : 'text-slate-400'">
          <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none">
            <path d="M21 21l-4.3-4.3m1.8-5.2a7 7 0 11-14 0 7 7 0 0114 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>
  </header>

  <!-- Mobile nav drawer -->
  <div x-show="ui.mobileNavOpen" x-transition.opacity class="fixed inset-0 z-50 md:hidden">
    <div class="absolute inset-0 bg-black/50" @click="ui.mobileNavOpen = false"></div>
    <div
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="-translate-x-full"
      x-transition:enter-end="translate-x-0"
      x-transition:leave="transition ease-in duration-200"
      x-transition:leave-start="translate-x-0"
      x-transition:leave-end="-translate-x-full"
      class="absolute left-0 top-0 h-full w-[86vw] max-w-sm border-r p-4"
      :class="theme === 'dark'
        ? 'border-slate-800 bg-slate-950'
        : 'border-slate-200 bg-white'"
      @click.away="ui.mobileNavOpen = false"
    >
      <div class="flex items-center justify-between">
        <div class="text-sm font-semibold">Navigation</div>
        <button
          class="rounded-lg border px-3 py-2 hover:bg-slate-900/10"
          :class="theme === 'dark'
            ? 'border-slate-800 bg-slate-900/40 text-slate-200 hover:bg-slate-900'
            : 'border-slate-200 bg-white text-slate-800 hover:bg-slate-100'"
          @click="ui.mobileNavOpen = false"
        >
          Close
        </button>
      </div>

      <div class="mt-4">
        <template x-for="group in filteredNav()" :key="group.id">
          <div class="mb-4">
            <div class="mb-2 text-xs font-semibold uppercase tracking-wider" :class="theme === 'dark' ? 'text-slate-400' : 'text-slate-500'" x-text="group.title"></div>
            <div class="space-y-1">
              <template x-for="item in group.items" :key="item.route">
                <a
                  :href="`#/${item.route}`"
                  @click="ui.mobileNavOpen = false"
                  class="block rounded-lg px-3 py-2 text-sm"
                  :class="route === item.route
                    ? (theme === 'dark' ? 'bg-slate-900/70 text-white' : 'bg-slate-100 text-slate-900')
                    : (theme === 'dark' ? 'text-slate-200 hover:bg-slate-900/60' : 'text-slate-800 hover:bg-slate-100')"
                >
                  <span x-text="item.label"></span>
                </a>
              </template>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Main layout -->
  <div class="mx-auto grid max-w-7xl grid-cols-1 gap-6 px-4 py-6 md:grid-cols-[280px,1fr]">
    <!-- Sidebar -->
    <aside
      class="sticky top-[76px] hidden h-[calc(100vh-96px)] overflow-y-auto rounded-2xl border p-4 md:block"
      :class="theme === 'dark'
        ? 'border-slate-800/70 bg-slate-950/40'
        : 'border-slate-200 bg-white'"
    >
      <div class="mb-3">
        <div class="text-xs font-semibold uppercase tracking-wider" :class="theme === 'dark' ? 'text-slate-400' : 'text-slate-500'">Docs</div>
      </div>

      <template x-for="group in filteredNav()" :key="group.id">
        <div class="mb-5">
          <button
            class="flex w-full items-center justify-between rounded-xl px-2 py-2 text-left text-xs font-semibold uppercase tracking-wider hover:bg-slate-900/10"
            :class="theme === 'dark' ? 'text-slate-400 hover:bg-slate-900/40' : 'text-slate-500 hover:bg-slate-100'"
            @click="toggleGroup(group.id)"
          >
            <span x-text="group.title"></span>
            <svg class="h-4 w-4 transition" :class="(theme === 'dark' ? 'text-slate-500' : 'text-slate-400') + (isGroupOpen(group.id) ? ' rotate-180' : '')" viewBox="0 0 24 24" fill="none">
              <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

          <div x-show="isGroupOpen(group.id)" x-transition class="mt-2 space-y-1">
            <template x-for="item in group.items" :key="item.route">
              <a
                :href="`#/${item.route}`"
                class="flex items-center justify-between rounded-xl px-3 py-2 text-sm"
                :class="route === item.route
                  ? (theme === 'dark' ? 'bg-slate-900/70 text-white ring-1 ring-slate-800' : 'bg-slate-100 text-slate-900 ring-1 ring-slate-200')
                  : (theme === 'dark' ? 'text-slate-200 hover:bg-slate-900/60' : 'text-slate-800 hover:bg-slate-100')"
              >
                <span class="truncate" x-text="item.label"></span>
                <span
                  class="ml-3 shrink-0 rounded-lg px-2 py-0.5 text-[11px]"
                  :class="theme === 'dark' ? 'bg-slate-900 text-slate-400' : 'bg-slate-200 text-slate-600'"
                  x-text="item.badge ?? ''"
                  x-show="item.badge"
                ></span>
              </a>
            </template>
          </div>
        </div>
      </template>

      <div class="mt-6 rounded-2xl border p-3" :class="theme === 'dark' ? 'border-slate-800/70 bg-slate-950/50' : 'border-slate-200 bg-slate-50'">
        <div class="text-sm font-semibold">Quick links</div>
        <div class="mt-2 space-y-2 text-sm">
          <a class="block hover:underline" :class="theme === 'dark' ? 'text-blue-200 hover:text-blue-100' : 'text-blue-600 hover:text-blue-700'" href="https://github.com/orgs/community-sdks/repositories?q=mailcow" target="_blank" rel="noreferrer">
            Mailcow repos →
          </a>
          <a class="block hover:underline" :class="theme === 'dark' ? 'text-blue-200 hover:text-blue-100' : 'text-blue-600 hover:text-blue-700'" href="https://github.com/orgs/community-sdks/repositories?q=php" target="_blank" rel="noreferrer">
            PHP repos →
          </a>
        </div>
      </div>
    </aside>

    <!-- Content -->
    <main class="min-h-[60vh]">
      <!-- Search results banner -->
      <div
        x-show="search.query.trim().length > 0"
        x-transition
        class="mb-4 rounded-2xl border p-4"
        :class="theme === 'dark'
          ? 'border-slate-800/70 bg-slate-950/40'
          : 'border-slate-200 bg-white'"
      >
        <div class="flex flex-col gap-1 sm:flex-row sm:items-center sm:justify-between">
          <div class="text-sm">
            <span class="font-semibold">Search:</span>
            <span :class="theme === 'dark' ? 'text-slate-300' : 'text-slate-600'" x-text="search.query"></span>
          </div>
          <button
            class="inline-flex items-center justify-center rounded-xl border px-3 py-2 text-sm hover:bg-slate-900/10"
            :class="theme === 'dark'
              ? 'border-slate-800 bg-slate-900/40 text-slate-200 hover:bg-slate-900'
              : 'border-slate-200 bg-white text-slate-800 hover:bg-slate-100'"
            @click="clearSearch()"
          >
            Clear
          </button>
        </div>

        <div class="mt-3 text-sm" :class="theme === 'dark' ? 'text-slate-400' : 'text-slate-500'" x-show="search.results.length === 0">
          No results. Try a different keyword.
        </div>

        <div class="mt-3 grid gap-2" x-show="search.results.length > 0">
          <template x-for="hit in search.results.slice(0, 8)" :key="hit.route + hit.title">
            <a
              class="rounded-xl border p-3 hover:bg-slate-900/10"
              :class="theme === 'dark'
                ? 'border-slate-800/60 bg-slate-950/40 hover:bg-slate-900/40'
                : 'border-slate-200 bg-slate-50 hover:bg-slate-100'"
              :href="`#/${hit.route}`"
              @click="search.query=''; onSearch()"
            >
              <div class="text-sm font-semibold" x-text="hit.title"></div>
              <div class="mt-1 text-xs" :class="theme === 'dark' ? 'text-slate-400' : 'text-slate-600'" x-text="hit.snippet"></div>
            </a>
          </template>
        </div>
      </div>

      <!-- Page container -->
      <article class="rounded-2xl border shadow-soft" :class="theme === 'dark' ? 'border-slate-800/70 bg-slate-950/40' : 'border-slate-200 bg-white'">
        <div class="border-b px-6 py-5" :class="theme === 'dark' ? 'border-slate-800/70' : 'border-slate-200'">
          <div class="flex items-start justify-between gap-4">
            <div>
              <h1 class="text-xl font-semibold tracking-tight" x-text="page.title"></h1>
              <p class="mt-1 text-sm" :class="theme === 'dark' ? 'text-slate-400' : 'text-slate-600'" x-text="page.description"></p>
            </div>

            <div class="shrink-0">
              <button
                class="inline-flex items-center gap-2 rounded-xl border px-3 py-2 text-sm hover:bg-slate-900/10"
                :class="theme === 'dark'
                  ? 'border-slate-800 bg-slate-900/40 text-slate-200 hover:bg-slate-900'
                  : 'border-slate-200 bg-white text-slate-800 hover:bg-slate-100'"
                @click="copyLink()"
                title="Copy page link"
              >
                <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none">
                  <path d="M10 13a5 5 0 007 0l1-1a5 5 0 00-7-7l-1 1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M14 11a5 5 0 01-7 0l-1 1a5 5 0 007 7l1-1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                Copy link
              </button>
            </div>
          </div>
        </div>

        <div class="px-6 py-6 space-y-8">
          <template x-for="block in page.blocks" :key="block.id">
            <section>
              <template x-if="block.type === 'hero'">
                <div
                  class="rounded-2xl border p-6"
                  :class="theme === 'dark'
                    ? 'border-slate-800/70 bg-gradient-to-br from-slate-950/60 to-slate-900/30'
                    : 'border-slate-200 bg-gradient-to-br from-white to-slate-50'"
                >
                  <div class="text-sm font-semibold" :class="theme === 'dark' ? 'text-blue-200' : 'text-blue-700'" x-text="block.kicker"></div>
                  <div class="mt-2 text-2xl font-semibold tracking-tight" x-text="block.headline"></div>
                  <div class="mt-2 text-sm" :class="theme === 'dark' ? 'text-slate-300' : 'text-slate-700'" x-text="block.text"></div>

                  <div class="mt-5 flex flex-wrap gap-2">
                    <template x-for="cta in block.ctas" :key="cta.href">
                      <a
                        class="inline-flex items-center gap-2 rounded-xl border px-4 py-2 text-sm hover:bg-slate-900/10"
                        :class="theme === 'dark'
                          ? 'border-slate-800 bg-slate-900/40 text-slate-100 hover:bg-slate-900'
                          : 'border-slate-200 bg-white text-slate-900 hover:bg-slate-100'"
                        :href="cta.href"
                        :target="cta.external ? '_blank' : null"
                        rel="noreferrer"
                      >
                        <span x-text="cta.label"></span>
                        <span x-show="cta.external">↗</span>
                      </a>
                    </template>
                  </div>
                </div>
              </template>

              <template x-if="block.type === 'text'">
                <div
                  class="prose max-w-none"
                  :class="theme === 'dark'
                    ? 'prose-invert prose-p:text-slate-300 prose-li:text-slate-300 prose-strong:text-white prose-a:text-blue-200 hover:prose-a:text-blue-100'
                    : 'prose-slate prose-p:text-slate-700 prose-li:text-slate-700 prose-strong:text-slate-900 prose-a:text-blue-700 hover:prose-a:text-blue-800'"
                >
                  <div x-html="block.html"></div>
                </div>
              </template>

              <template x-if="block.type === 'callouts'">
                <div class="grid gap-3 sm:grid-cols-2">
                  <template x-for="c in block.items" :key="c.title">
                    <div class="rounded-2xl border p-4" :class="theme === 'dark' ? 'border-slate-800/70 bg-slate-950/40' : 'border-slate-200 bg-slate-50'">
                      <div class="text-sm font-semibold" x-text="c.title"></div>
                      <div class="mt-1 text-sm" :class="theme === 'dark' ? 'text-slate-300' : 'text-slate-700'" x-text="c.text"></div>
                    </div>
                  </template>
                </div>
              </template>

              <template x-if="block.type === 'accordion'">
                <div class="space-y-2">
                  <template x-for="item in block.items" :key="item.title">
                    <div class="rounded-2xl border" :class="theme === 'dark' ? 'border-slate-800/70 bg-slate-950/40' : 'border-slate-200 bg-white'">
                      <button
                        class="flex w-full items-center justify-between gap-4 px-4 py-3 text-left"
                        @click="item.open = !item.open"
                      >
                        <div class="text-sm font-semibold" x-text="item.title"></div>
                        <svg class="h-5 w-5 transition" :class="(theme === 'dark' ? 'text-slate-400' : 'text-slate-500') + (item.open ? ' rotate-180' : '')" viewBox="0 0 24 24" fill="none">
                          <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                      </button>
                      <div
                        x-show="item.open"
                        x-transition
                        class="border-t px-4 py-3 text-sm"
                        :class="theme === 'dark' ? 'border-slate-800/70 text-slate-300' : 'border-slate-200 text-slate-700'"
                      >
                        <div x-html="item.html"></div>
                      </div>
                    </div>
                  </template>
                </div>
              </template>

              <template x-if="block.type === 'code'">
                <div class="rounded-2xl border" :class="theme === 'dark' ? 'border-slate-800/70 bg-slate-950/60' : 'border-slate-200 bg-slate-50'">
                  <div class="flex items-center justify-between border-b px-4 py-2" :class="theme === 'dark' ? 'border-slate-800/70' : 'border-slate-200'">
                    <div class="text-xs font-semibold uppercase tracking-wider" :class="theme === 'dark' ? 'text-slate-400' : 'text-slate-600'" x-text="block.label"></div>
                    <button
                      class="rounded-lg border px-3 py-1.5 text-xs hover:bg-slate-900/10"
                      :class="theme === 'dark'
                        ? 'border-slate-800 bg-slate-900/40 text-slate-200 hover:bg-slate-900'
                        : 'border-slate-200 bg-white text-slate-800 hover:bg-slate-100'"
                      @click="copyText(block.code)"
                    >
                      Copy
                    </button>
                  </div>
                  <pre class="overflow-x-auto p-4 text-sm"><code class="font-mono" :class="theme === 'dark' ? 'text-slate-200' : 'text-slate-900'" x-text="block.code"></code></pre>
                </div>
              </template>

              <template x-if="block.type === 'gridLinks'">
                <div class="grid gap-3 sm:grid-cols-2">
                  <template x-for="l in block.items" :key="l.title">
                    <a
                      class="group rounded-2xl border p-4 hover:bg-slate-900/10"
                      :class="theme === 'dark'
                        ? 'border-slate-800/70 bg-slate-950/40 hover:bg-slate-900/40'
                        : 'border-slate-200 bg-white hover:bg-slate-100'"
                      :href="l.href"
                      :target="l.external ? '_blank' : null"
                      rel="noreferrer"
                    >
                      <div class="flex items-start justify-between gap-4">
                        <div>
                          <div class="text-sm font-semibold group-hover:text-blue-500" x-text="l.title"></div>
                          <div class="mt-1 text-sm" :class="theme === 'dark' ? 'text-slate-300' : 'text-slate-700'" x-text="l.text"></div>
                        </div>
                        <div :class="theme === 'dark' ? 'text-slate-500 group-hover:text-blue-200' : 'text-slate-400 group-hover:text-blue-700'">↗</div>
                      </div>
                    </a>
                  </template>
                </div>
              </template>
            </section>
          </template>
        </div>

        <!-- Footer -->
        <div class="border-t px-6 py-5 text-sm" :class="theme === 'dark' ? 'border-slate-800/70 text-slate-400' : 'border-slate-200 text-slate-600'">
          <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
            <div>
              Community-maintained SDKs • Not officially affiliated unless explicitly stated.
            </div>
            <div class="flex items-center gap-3">
              <a class="hover:underline" :class="theme === 'dark' ? 'text-blue-200 hover:text-blue-100' : 'text-blue-700 hover:text-blue-800'" href="https://github.com/community-sdks" target="_blank" rel="noreferrer">GitHub</a>
              <span :class="theme === 'dark' ? 'text-slate-600' : 'text-slate-300'">•</span>
              <a class="hover:underline" :class="theme === 'dark' ? 'text-blue-200 hover:text-blue-100' : 'text-blue-700 hover:text-blue-800'" href="https://github.com/orgs/community-sdks/repositories?q=mailcow" target="_blank" rel="noreferrer">Mailcow</a>
              <span :class="theme === 'dark' ? 'text-slate-600' : 'text-slate-300'">•</span>
              <a class="hover:underline" :class="theme === 'dark' ? 'text-blue-200 hover:text-blue-100' : 'text-blue-700 hover:text-blue-800'" href="https://github.com/orgs/community-sdks/repositories?q=php" target="_blank" rel="noreferrer">PHP</a>
            </div>
          </div>
        </div>
      </article>
    </main>
  </div>

  <!-- Toast -->
  <div class="fixed bottom-4 left-1/2 z-50 -translate-x-1/2">
    <div
      x-show="ui.toast.show"
      x-transition.opacity
      class="rounded-2xl border px-4 py-3 text-sm shadow-soft backdrop-blur"
      :class="theme === 'dark'
        ? 'border-slate-800 bg-slate-950/90 text-slate-200'
        : 'border-slate-200 bg-white/90 text-slate-900'"
    >
      <span x-text="ui.toast.message"></span>
    </div>
  </div>
</div>

<script>
  function ThemeApp() {
    return {
      theme: 'dark',

      init() {
        const stored = localStorage.getItem('community_sdks_theme');
        if (stored === 'light' || stored === 'dark') {
          this.theme = stored;
          return;
        }

        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        this.theme = prefersDark ? 'dark' : 'light';
        localStorage.setItem('community_sdks_theme', this.theme);
      },

      toggleTheme() {
        this.theme = this.theme === 'dark' ? 'light' : 'dark';
        localStorage.setItem('community_sdks_theme', this.theme);
      }
    };
  }

  function DocsApp() {
    return {
      theme: 'dark',
      route: '',
      ui: {
        mobileNavOpen: false,
        navOpen: { core: true, services: true, contribute: true },
        toast: { show: false, message: '' },
      },
      search: { query: '', results: [] },
      page: { title: '', description: '', blocks: [] },

      nav() {
        return [
          { id: 'core', title: 'Core', items: [
            { route: '', label: 'Overview', badge: 'Start' },
            { route: 'getting-started', label: 'Getting started' },
            { route: 'standards', label: 'SDK standards' },
            { route: 'languages', label: 'Languages' },
          ]},
          { id: 'services', title: 'Services', items: [
            { route: 'services/mailcow', label: 'Mailcow', badge: 'Live' },
            { route: 'services/add-a-service', label: 'Add a service' },
          ]},
          { id: 'contribute', title: 'Contribute', items: [
            { route: 'contributing', label: 'Contributing' },
            { route: 'support', label: 'Support & governance' },
          ]},
        ];
      },

      pages() {
        const mk = (s) => s;
        return {
          '': {
            title: 'Overview',
            description: 'A neutral, community-driven hub for missing SDKs.',
            blocks: [
              { id: 'hero', type: 'hero', kicker: 'Community SDKs', headline: 'Missing SDKs, delivered.',
                text: 'We build high-quality SDKs for services that lack official implementations in specific languages. Clean structure, typed models, explicit errors, and docs that help you ship.',
                ctas: [
                  { label: 'Mailcow repos', href: 'https://github.com/orgs/community-sdks/repositories?q=mailcow', external: true },
                  { label: 'PHP repos', href: 'https://github.com/orgs/community-sdks/repositories?q=php', external: true },
                  { label: 'Getting started', href: '#/getting-started', external: false },
                ],
              },
              { id: 'callouts', type: 'callouts', items: [
                { title: 'Neutral namespace', text: 'No branding conflicts. If a service adopts an SDK, transfer can happen cleanly.' },
                { title: 'Native feel per ecosystem', text: 'Go should feel like Go. Rust should feel like Rust. PHP should feel like PHP.' },
                { title: 'Production-oriented', text: 'Typed models, explicit error handling, consistent naming, stable structure.' },
                { title: 'Docs-first', text: 'Every SDK repo should include quickstart, auth, examples, and endpoint coverage.' },
              ]},
              { id: 'accordion', type: 'accordion', items: [
                { title: 'What lives here?', open: true, html: mk(`
                  <ul class="list-disc pl-5 space-y-1">
                    <li>SDK repositories named <code class="font-mono">service-language</code></li>
                    <li>GitHub Pages documentation hub (this site)</li>
                    <li>Community standards and contribution guidelines</li>
                  </ul>
                `)},
                { title: 'Repository naming convention', open: false, html: mk(`
                  <p>Use <code class="font-mono">service-language</code> to keep everything discoverable and consistent.</p>
                  <p class="mt-2">Examples: <code class="font-mono">mailcow-php</code>, <code class="font-mono">mailcow-go</code>, <code class="font-mono">godaddy-ts</code>.</p>
                `)},
                { title: 'Official status', open: false, html: mk(`
                  <p>These are community-maintained projects unless explicitly stated. If a vendor wants to adopt a repository, it can be transferred or archived appropriately.</p>
                `)},
              ]},
              { id: 'gridlinks', type: 'gridLinks', items: [
                { title: 'Browse Mailcow SDKs', text: 'See all Mailcow repos in this org.', href: 'https://github.com/orgs/community-sdks/repositories?q=mailcow', external: true },
                { title: 'Browse PHP SDKs', text: 'See all PHP repos in this org.', href: 'https://github.com/orgs/community-sdks/repositories?q=php', external: true },
              ]},
            ],
          },

          'getting-started': {
            title: 'Getting started',
            description: 'How to pick an SDK, install it, and validate coverage.',
            blocks: [
              { id: 'text1', type: 'text', html: mk(`
                <h3>1) Find your service</h3>
                <p>Use the org repository search (or these curated queries) to locate SDK repos:</p>
                <ul>
                  <li><a href="https://github.com/orgs/community-sdks/repositories?q=mailcow" target="_blank" rel="noreferrer">Mailcow repos</a></li>
                  <li><a href="https://github.com/orgs/community-sdks/repositories?q=php" target="_blank" rel="noreferrer">PHP repos</a></li>
                </ul>

                <h3 class="mt-6">2) Read the repository README</h3>
                <p>Each SDK repo should include:</p>
                <ul>
                  <li>Installation</li>
                  <li>Authentication</li>
                  <li>Examples</li>
                  <li>Error handling</li>
                  <li>Coverage / endpoints</li>
                </ul>

                <h3 class="mt-6">3) Validate coverage</h3>
                <p>Before going to production, confirm that the endpoints you need are implemented.</p>
              `)},
              { id: 'code1', type: 'code', label: 'Tip', code:
`Pro tip: use the GitHub search inside the org.

Example queries:
- mailcow
- php
- rust
- godaddy

https://github.com/orgs/community-sdks/repositories?q=<query>`},
              { id: 'accordion1', type: 'accordion', items: [
                { title: 'Recommended README structure (per SDK repo)', open: true, html: mk(`
                  <ol class="list-decimal pl-5 space-y-1">
                    <li>What the SDK is + status (Stable/Beta/Experimental)</li>
                    <li>Install</li>
                    <li>Authentication</li>
                    <li>Quickstart examples</li>
                    <li>Endpoints / coverage</li>
                    <li>Error handling</li>
                    <li>Contributing</li>
                    <li>License</li>
                  </ol>
                `)},
              ]},
            ],
          },

          'standards': {
            title: 'SDK standards',
            description: 'Consistency rules across repos to keep quality high.',
            blocks: [
              { id: 'callouts', type: 'callouts', items: [
                { title: 'Typed models', text: 'Prefer explicit request/response DTOs (or equivalents) in typed ecosystems.' },
                { title: 'Explicit errors', text: 'Surface actionable errors: status code, message, response body, retry hints.' },
                { title: 'Consistent naming', text: 'Keep endpoints grouped by feature, avoid random folder structures.' },
                { title: 'Examples first', text: 'Every major feature should have at least one runnable example.' },
              ]},
              { id: 'accordion', type: 'accordion', items: [
                { title: 'Minimum required files', open: true, html: mk(`
                  <ul class="list-disc pl-5 space-y-1">
                    <li><code class="font-mono">README.md</code> (install/auth/examples/coverage)</li>
                    <li><code class="font-mono">LICENSE</code></li>
                    <li><code class="font-mono">CONTRIBUTING.md</code></li>
                    <li><code class="font-mono">CHANGELOG.md</code> (recommended)</li>
                  </ul>
                `)},
                { title: 'Quality checklist', open: false, html: mk(`
                  <ul class="list-disc pl-5 space-y-1">
                    <li>Retries/backoff strategy documented (if applicable)</li>
                    <li>Timeouts configurable</li>
                    <li>Base URL configurable</li>
                    <li>Auth keys never logged by default</li>
                    <li>Clear, typed exceptions (or consistent error objects)</li>
                  </ul>
                `)},
              ]},
            ],
          },

          'languages': {
            title: 'Languages',
            description: 'Browse SDKs by language via GitHub query links.',
            blocks: [
              { id: 'text', type: 'text', html: mk(`
                <p>Use these links to list repositories by language keyword:</p>
                <ul>
                  <li><a href="https://github.com/orgs/community-sdks/repositories?q=php" target="_blank" rel="noreferrer">PHP</a></li>
                  <li><a href="https://github.com/orgs/community-sdks/repositories?q=py" target="_blank" rel="noreferrer">Python</a></li>
                  <li><a href="https://github.com/orgs/community-sdks/repositories?q=go" target="_blank" rel="noreferrer">Go</a></li>
                  <li><a href="https://github.com/orgs/community-sdks/repositories?q=js" target="_blank" rel="noreferrer">JavaScript</a></li>
                  <li><a href="https://github.com/orgs/community-sdks/repositories?q=ts" target="_blank" rel="noreferrer">TypeScript</a></li>
                  <li><a href="https://github.com/orgs/community-sdks/repositories?q=rust" target="_blank" rel="noreferrer">Rust</a></li>
                  <li><a href="https://github.com/orgs/community-sdks/repositories?q=java" target="_blank" rel="noreferrer">Java</a></li>
                  <li><a href="https://github.com/orgs/community-sdks/repositories?q=csharp" target="_blank" rel="noreferrer">C#</a></li>
                  <li><a href="https://github.com/orgs/community-sdks/repositories?q=cpp" target="_blank" rel="noreferrer">C++</a></li>
                  <li><a href="https://github.com/orgs/community-sdks/repositories?q=c" target="_blank" rel="noreferrer">C</a></li>
                </ul>
              `)},
              { id: 'callouts', type: 'callouts', items: [
                { title: 'Tip', text: 'Keep repo names consistent: service-language (e.g., mailcow-php).' },
                { title: 'Discoverability', text: 'Use common language suffixes (php, go, rust, ts, js, py).' },
              ]},
            ],
          },

          'services/mailcow': {
            title: 'Mailcow',
            description: 'Mailcow SDKs maintained under Community SDKs.',
            blocks: [
              { id: 'hero', type: 'hero', kicker: 'Service', headline: 'Mailcow SDKs',
                text: 'Browse repositories and pick the language you need. Each repo should document auth, installation, and examples.',
                ctas: [
                  { label: 'Browse Mailcow repos', href: 'https://github.com/orgs/community-sdks/repositories?q=mailcow', external: true },
                ],
              },
              { id: 'accordion', type: 'accordion', items: [
                { title: 'Suggested repo set', open: true, html: mk(`
                  <ul class="list-disc pl-5 space-y-1">
                    <li>mailcow-php</li><li>mailcow-js</li><li>mailcow-ts</li><li>mailcow-go</li><li>mailcow-py</li>
                    <li>mailcow-rust</li><li>mailcow-java</li><li>mailcow-csharp</li><li>mailcow-cpp</li><li>mailcow-c</li>
                  </ul>
                `)},
                { title: 'Docs checklist', open: false, html: mk(`
                  <ul class="list-disc pl-5 space-y-1">
                    <li>How to create an API key</li>
                    <li>IP allowlist requirements (if applicable)</li>
                    <li>Read-only vs read-write keys</li>
                    <li>Examples per major module</li>
                  </ul>
                `)},
              ]},
            ],
          },

          'services/add-a-service': {
            title: 'Add a service',
            description: 'How to propose or start a new service SDK set.',
            blocks: [
              { id: 'text', type: 'text', html: mk(`
                <h3>Start a new service</h3>
                <p>Create repositories using the naming convention:</p>
                <p><code class="font-mono">service-language</code></p>

                <h3 class="mt-6">Open an issue</h3>
                <p>Propose the service, list missing languages, and share API docs links.</p>
              `)},
              { id: 'code', type: 'code', label: 'Naming', code:
`Examples:
- godaddy-php
- godaddy-go
- cloudflare-ts
- vendorx-rust

Convention: service-language`},
            ],
          },

          'contributing': {
            title: 'Contributing',
            description: 'PR workflow, conventions, and expectations.',
            blocks: [
              { id: 'text', type: 'text', html: mk(`
                <h3>How to contribute</h3>
                <ul>
                  <li>Open an issue (bug/feature/proposal)</li>
                  <li>Create a PR with clear scope</li>
                  <li>Keep breaking changes explicit</li>
                </ul>
                <h3 class="mt-6">Good PRs include</h3>
                <ul>
                  <li>Tests (when feasible)</li>
                  <li>Examples</li>
                  <li>Documentation updates</li>
                  <li>Changelog entry (recommended)</li>
                </ul>
              `)},
            ],
          },

          'support': {
            title: 'Support & governance',
            description: 'Neutral hosting, transfer-friendly policy, and community rules.',
            blocks: [
              { id: 'accordion', type: 'accordion', items: [
                { title: 'Neutral namespace policy', open: true, html: mk(`<p>This org is intentionally neutral. If a vendor wants to adopt a repo, ownership transfer is possible.</p>`)},
                { title: 'Non-affiliation disclaimer', open: false, html: mk(`<p>SDKs are community-maintained unless a repo explicitly states official affiliation.</p>`)},
                { title: 'Security reporting', open: false, html: mk(`<p>If you find a security issue, open a private report via GitHub Security Advisories (if enabled).</p>`)},
              ]},
            ],
          },
        };
      },

      init(theme) {
        this.theme = theme ?? 'dark';
        window.addEventListener('hashchange', () => this.syncRouteFromHash());
        window.addEventListener('theme-changed', (e) => { this.theme = e.detail.theme; });
        this.restoreNavState();
        this.syncRouteFromHash();
        this.onSearch();
      },

      syncRouteFromHash() {
        const raw = (location.hash || '#/').replace(/^#\//, '');
        this.route = decodeURIComponent(raw);
        if (this.route.endsWith('/')) this.route = this.route.slice(0, -1);
        this.loadPage(this.route);
      },

      loadPage(route) {
        const pages = this.pages();
        const key = pages[route] ? route : '';
        const p = pages[key];

        this.page = {
          title: p.title,
          description: p.description,
          blocks: (p.blocks || []).map(b => {
            if (b.type === 'accordion') return { ...b, items: b.items.map(i => ({ ...i })) };
            return { ...b };
          }),
        };

        this.ui.mobileNavOpen = false;
        this.scrollToTopSoft();
      },

      scrollToTopSoft() {
        try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch { window.scrollTo(0, 0); }
      },

      toggleGroup(groupId) {
        this.ui.navOpen[groupId] = !this.ui.navOpen[groupId];
        this.persistNavState();
      },

      isGroupOpen(groupId) {
        return this.ui.navOpen[groupId] !== false;
      },

      persistNavState() {
        try { localStorage.setItem('community_sdks_nav_open', JSON.stringify(this.ui.navOpen)); } catch {}
      },

      restoreNavState() {
        try {
          const raw = localStorage.getItem('community_sdks_nav_open');
          if (!raw) return;
          const parsed = JSON.parse(raw);
          if (parsed && typeof parsed === 'object') this.ui.navOpen = { ...this.ui.navOpen, ...parsed };
        } catch {}
      },

      focusSearch() {
        const el = this.$refs.searchInput;
        if (el) el.focus();
      },

      clearSearch() {
        this.search.query = '';
        this.onSearch();
      },

      onSearch() {
        const q = (this.search.query || '').trim().toLowerCase();
        if (!q) { this.search.results = []; return; }

        const pages = this.pages();
        const hits = [];

        for (const [route, p] of Object.entries(pages)) {
          const hayTitle = (p.title || '').toLowerCase();
          const hayDesc = (p.description || '').toLowerCase();

          const blockText = (p.blocks || []).map(b => {
            if (b.type === 'hero') return `${b.kicker || ''} ${b.headline || ''} ${b.text || ''}`;
            if (b.type === 'text') return this.stripHtml(b.html || '');
            if (b.type === 'callouts') return (b.items || []).map(i => `${i.title} ${i.text}`).join(' ');
            if (b.type === 'accordion') return (b.items || []).map(i => `${i.title} ${this.stripHtml(i.html || '')}`).join(' ');
            if (b.type === 'code') return `${b.label || ''} ${b.code || ''}`;
            if (b.type === 'gridLinks') return (b.items || []).map(i => `${i.title} ${i.text}`).join(' ');
            return '';
          }).join(' ');

          const hay = `${hayTitle} ${hayDesc} ${blockText}`.toLowerCase();
          if (hay.includes(q)) hits.push({ route, title: p.title, snippet: this.makeSnippet(hay, q) });
        }

        hits.sort((a, b) => {
          const aTop = a.title.toLowerCase().includes(q) ? 0 : 1;
          const bTop = b.title.toLowerCase().includes(q) ? 0 : 1;
          if (aTop !== bTop) return aTop - bTop;
          return a.route.localeCompare(b.route);
        });

        this.search.results = hits;
      },

      stripHtml(html) {
        const tmp = document.createElement('div');
        tmp.innerHTML = html;
        return (tmp.textContent || tmp.innerText || '').replace(/\s+/g, ' ').trim();
      },

      makeSnippet(hay, q) {
        const idx = hay.indexOf(q);
        if (idx === -1) return 'Match found.';
        const start = Math.max(0, idx - 40);
        const end = Math.min(hay.length, idx + q.length + 80);
        const raw = hay.slice(start, end).replace(/\s+/g, ' ').trim();
        return (start > 0 ? '…' : '') + raw + (end < hay.length ? '…' : '');
      },

      filteredNav() {
        const q = (this.search.query || '').trim().toLowerCase();
        const nav = this.nav();
        if (!q) return nav;

        const pages = this.pages();
        return nav.map(g => {
          const items = g.items.filter(it => {
            const lbl = (it.label || '').toLowerCase();
            if (lbl.includes(q)) return true;
            const p = pages[it.route ?? ''];
            if (!p) return false;
            const hay = `${p.title} ${p.description}`.toLowerCase();
            return hay.includes(q);
          });
          return { ...g, items };
        }).filter(g => g.items.length > 0);
      },

      async copyText(text) {
        try {
          await navigator.clipboard.writeText(text);
          this.toast('Copied!');
        } catch {
          const ta = document.createElement('textarea');
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          ta.remove();
          this.toast('Copied!');
        }
      },

      copyLink() {
        this.copyText(location.href);
      },

      toast(message) {
        this.ui.toast.message = message;
        this.ui.toast.show = true;
        clearTimeout(this._toastTimer);
        this._toastTimer = setTimeout(() => (this.ui.toast.show = false), 1400);
      },
    };
  }
</script>
